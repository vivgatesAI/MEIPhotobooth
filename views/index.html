<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MEI Photo Booth</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="app-root">
    <section id="welcomeView" class="view active welcome-view">
      <div class="welcome-card">
        <img src="/assets/logo.png" alt="MEI" class="welcome-logo" />
        <h1>MEI Photo Booth</h1>
        <p class="script">Boston Medical Engagement & Impact</p>
        <p class="welcome-copy">Snap or upload a photo and transform it with Venice AI styles.</p>
        <div class="welcome-actions">
          <button id="startBtn" class="btn primary">Take a Photo 🎉</button>
          <label class="btn secondary upload-inline">Upload Photo 📂
            <input id="uploadFromWelcome" type="file" accept="image/*" />
          </label>
        </div>
      </div>
    </section>

    <section id="cameraView" class="view camera-view">
      <div class="camera-shell">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="captureCanvas" style="display:none"></canvas>
        <img id="previewImg" alt="preview" style="display:none" />
      </div>
      <div class="camera-controls">
        <button id="homeBtn" class="btn secondary">Home</button>
        <button id="captureBtn" class="capture-btn" disabled aria-label="Take Photo"></button>
        <label class="btn secondary upload-inline">Upload
          <input id="uploadInput" type="file" accept="image/*" />
        </label>
      </div>
    </section>

    <section id="previewView" class="view preview-view">
      <div class="preview-shell">
        <img id="resultImg" alt="result" />
      </div>
      <div class="processing" id="progressWrap">
        <div class="spinner"></div>
        <span>Applying AI style…</span>
      </div>
      <div class="style-toolbar">
        <div id="presetGrid" class="preset-pills"></div>
      </div>
      <div class="bottom-actions">
        <button id="retakeBtn" class="btn secondary">Retake</button>
        <button id="generateBtn" class="btn tertiary">Apply Style</button>
        <button id="downloadBtn" class="btn primary">Save</button>
      </div>
      <p id="status" class="status">Ready</p>
    </section>

    <section id="consentModal" class="modal hidden">
      <div class="modal-card">
        <h3>Quick Note!</h3>
        <p>This photo booth needs camera access to take pictures. You can also upload from your phone library.</p>
        <div class="modal-actions">
          <button id="cancelConsentBtn" class="btn secondary">Cancel</button>
          <button id="agreeConsentBtn" class="btn primary">I Agree</button>
        </div>
      </div>
    </section>
  </main>
  <script src="/assets/app.js"></script>
</body>
</html>
