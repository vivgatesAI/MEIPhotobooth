<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MEI Photo Booth</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="app single-screen">
    <header class="topbar">
      <div class="brand">
        <img src="/assets/logo.png" alt="logo" />
        <div>
          <h1>MEI Photo Booth</h1>
          <p>Boston · Medical Engagement & Impact</p>
        </div>
      </div>
      <div class="status-inline" id="status">Ready</div>
    </header>

    <section class="workspace">
      <div class="left-panel">
        <div class="camera-frame">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="captureCanvas" style="display:none"></canvas>
          <img id="previewImg" alt="preview" style="display:none" />
        </div>

        <div class="quick-actions">
          <button id="startCameraBtn" class="btn primary">Enable Camera</button>
          <button id="captureBtn" class="btn" disabled>Capture</button>
          <label class="btn file-btn">Upload
            <input id="uploadInput" type="file" accept="image/*" />
          </label>
          <button id="clearBtn" class="btn">Reset</button>
        </div>

        <div class="processing" id="progressWrap">
          <div class="spinner"></div>
          <div class="processing-text">Processing image and preserving likeness…</div>
          <div class="wave"></div>
        </div>
      </div>

      <div class="right-panel">
        <div class="control-group compact">
          <p class="label">Presets</p>
          <div id="presetGrid" class="preset-pills"></div>
          <textarea id="customPrompt" placeholder="Custom look…" style="display:none"></textarea>
        </div>

        <div class="control-group compact">
          <p class="label">Model</p>
          <select id="modelSelect" class="model-select"></select>
          <label class="soft-label"><input id="softerStyle" type="checkbox" /> Softer style</label>
        </div>

        <div class="control-group compact">
          <button id="generateBtn" class="btn primary" disabled>Generate</button>
          <button id="regenerateBtn" class="btn" disabled>Regenerate</button>
        </div>

        <div class="result-frame">
          <img id="resultImg" alt="result" style="display:none" />
        </div>

        <div class="control-group compact two">
          <button id="downloadBtn" class="btn" disabled>Download</button>
          <button id="saveLocalBtn" class="btn primary" disabled>Save</button>
        </div>

        <div class="control-group compact two">
          <button id="openGalleryBtn" class="btn">Saved Photos</button>
          <button id="clearGalleryBtn" class="btn">Clear Saved</button>
        </div>
      </div>
    </section>

    <section class="gallery-inline" id="galleryCard" style="display:none">
      <div id="galleryGrid" class="gallery-grid"></div>
    </section>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
